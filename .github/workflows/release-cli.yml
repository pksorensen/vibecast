name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Build binaries
        run: bash scripts/build-npm.sh

      - name: Sync version to npm packages
        run: |
          if [ -n "${{ needs.release-please.outputs.version }}" ]; then
            VERSION="${{ needs.release-please.outputs.version }}"
          else
            VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          fi
          NPM_DIR="npm"

          # Update all platform packages
          for dir in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            jq --arg v "$VERSION" '.version = $v' "$NPM_DIR/$dir/package.json" > tmp.json && mv tmp.json "$NPM_DIR/$dir/package.json"
          done

          # Update main package and its optional dependencies
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies = (
              .optionalDependencies | to_entries | map(.value = $v) | from_entries
            )
          ' "$NPM_DIR/vibecast/package.json" > tmp.json && mv tmp.json "$NPM_DIR/vibecast/package.json"

      - name: Publish platform packages
        run: |
          NPM_DIR="npm"
          for dir in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            echo "Publishing @agentics-live/$dir..."
            cd "$NPM_DIR/$dir"
            npm publish --access public --provenance
            cd -
          done

      - name: Publish main package
        run: |
          cd npm/vibecast
          npm publish --access public --provenance

      # Publish convention-named binaries to the agentics.dk release store so
      #   curl -fsSL https://agentics.dk/install/vibecast.sh | bash
      # works (GitHub OIDC trusted publishing — no PAT; see the
      # agentics-cli-release skill). No windows target: vibecast needs tmux.
      #
      # KNOWN LIMITATION: the npm packages ship claude-plugin/ next to the
      # binary (PluginDir()); the bare-binary install does not include it yet.
      # Hook-dependent features require the npm install until claude-plugin is
      # embedded in the binary.
      - name: Publish to agentics.dk release store
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          REC="vibecast-${VERSION}"
          mkdir -p dist
          cp npm/linux-x64/bin/vibecast     dist/vibecast_linux_amd64
          cp npm/linux-arm64/bin/vibecast   dist/vibecast_linux_arm64
          cp npm/darwin-x64/bin/vibecast    dist/vibecast_darwin_amd64
          cp npm/darwin-arm64/bin/vibecast  dist/vibecast_darwin_arm64
          ( cd dist && sha256sum vibecast_* > "vibecast_${VERSION}_checksums.txt" )
          OIDC=$(curl -fsS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://agentics.dk/releases" | jq -r '.value')
          [ -n "$OIDC" ] && [ "$OIDC" != "null" ] || { echo "::error::failed to mint OIDC token"; exit 1; }
          curl -fsS -X POST -H "Authorization: Bearer ${OIDC}" -H "Content-Type: application/json" \
            -d "{\"component\":\"vibecast\",\"semver\":\"${VERSION}\",\"tagName\":\"${TAG}\"}" \
            https://agentics.dk/api/releases >/dev/null
          for f in dist/vibecast_*; do
            echo "uploading $(basename "$f")"
            curl -fsS -X PUT -H "Authorization: Bearer ${OIDC}" \
              --data-binary @"$f" \
              "https://agentics.dk/api/releases/${REC}/attachments/$(basename "$f")"
            echo
          done
          curl -fsS -X PUT -H "Authorization: Bearer ${OIDC}" \
            "https://agentics.dk/api/releases/${REC}/publish" >/dev/null
          echo "published ${REC}"
